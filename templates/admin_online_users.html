<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンラインユーザー一覧</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container my-4">
    <a href="{{ url_for('main_app') }}" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left"></i> 戻る</a>
    <h1 class="mb-4"><i class="bi bi-person-check-fill"></i> オンラインユーザー一覧</h1>
    
    <div class="card">
        <div class="card-header">
            現在オンライン中のユーザー
        </div>
        <ul class="list-group list-group-flush">
            {% for user in online_users_list %}
            <li class="list-group-item d-flex justify-content-between align-items-center">
                <div>
                    <span class="badge badge-success mr-2">オンライン</span>
                    <strong>{{ user.username }}</strong> (ID: {{ user.id }})
                </div>
                <span class="text-muted">アカウントタイプ: {{ user.account_type }}</span>
            </li>
            {% else %}
            <li class="list-group-item text-muted">現在オンラインのユーザーはいません。</li>
            {% endfor %}
        </ul>
    </div>
</div>
</body>
</html>
