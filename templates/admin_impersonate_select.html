<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代理ログイン</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container my-4" style="max-width: 600px;">
    <a href="{{ url_for('main_app') }}" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left"></i> 戻る</a>
    <h1 class="mb-4"><i class="bi bi-person-badge-fill"></i> 代理ログイン</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin_impersonate_select') }}">
                <div class="form-group">
                    <label for="user_id">代理ログインしたいユーザーを選択してください</label>
                    <select name="user_id" id="user_id" class="form-control" required>
                        <option value="">-- ユーザーを選択 --</option>
                        {% for user in users %}
                        <option value="{{ user.id }}">{{ user.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-warning btn-block">このユーザーとしてログインする</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
