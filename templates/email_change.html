<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>メールアドレス変更 - TMHKchat</title><link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"></head><body><div class="container my-4" style="max-width: 700px;"><a href="{{ url_for('settings_page') }}" class="btn btn-secondary mb-4"><i class="bi bi-arrow-left"></i> 設定に戻る</a><h1 class="mb-4"><i class="bi bi-envelope-at"></i> メールアドレス変更</h1>{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="alert alert-{{ 'danger' if category=='error' else category }} alert-dismissible fade show">{{ message }}<button type="button" class="close" data-dismiss="alert"><span>&times;</span></button></div>{% endfor %}{% endif %}{% endwith %}<div class="card"><div class="card-body"><form method="POST"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/><div class="form-group mb-3"><label class="form-label">新しいメールアドレス</label><input type="email" name="new_email" class="form-control" placeholder="example@email.com" required></div><button class="btn btn-primary"><i class="bi bi-save"></i> 更新</button></form><hr><p class="text-muted small mb-0">メールアドレスは任意です。未設定でも利用できます。</p></div></div></div><script src="https://code.jquery.com/jquery-3.5.1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script></body></html>
