<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エラー - TMHKchat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body text-center">
                        <h1 class="display-1 text-danger">{{ error_code }}</h1>
                        <h4 class="card-title">エラーが発生しました</h4>
                        <p class="card-text">{{ error_message }}</p>
                        <a href="{{ url_for('root') }}" class="btn btn-primary">
                            <i class="bi bi-house"></i> ホームに戻る
                        </a>
                        <a href="javascript:history.back()" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> 前のページに戻る
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
