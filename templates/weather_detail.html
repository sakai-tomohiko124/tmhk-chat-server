<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>天気予報詳細 - TMHKchat</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="container mt-4">
  <a href="{{ url_for('main_app') }}">&laquo; 戻る</a>
  <h2 class="my-3">天気予報 詳細</h2>
  <div class="card mb-3">
    <div class="card-header">最新データ</div>
    <div class="card-body">
      {% if weather %}
        <p class="mb-1"><strong>ソース:</strong> {{ weather.source }}</p>
        <p class="mb-1"><strong>内容:</strong><br>{{ weather.data | nl2br }}</p>
        <p class="text-muted"><small>更新: {{ weather.timestamp }}</small></p>
      {% else %}
        <p>データがありません。</p>
      {% endif %}
    </div>
  </div>
  <div class="alert alert-info">このページは今後、時間別/明日以降の予報拡張や警報連携を追加予定です。</div>
</body>
</html>
