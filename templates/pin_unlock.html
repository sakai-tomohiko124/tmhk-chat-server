<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>PIN解除 - TMHKchat</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container py-5" style="max-width:420px;">
    <h3 class="mb-4 text-center">画面ロック解除</h3>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat,msg in messages %}
          <div class="alert alert-{{cat}} py-2">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <div class="card shadow-sm">
      <div class="card-body">
        <p class="small text-muted">4桁のPINを入力してください。</p>
        <form method="POST">
          <div class="form-group">
            <input type="password" name="pin" maxlength="4" pattern="\d{4}" class="form-control form-control-lg text-center" placeholder="----" required autofocus>
          </div>
          <button class="btn btn-primary btn-block" type="submit">解除</button>
        </form>
        <hr>
        <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary btn-sm btn-block">別アカウントでログイン</a>
      </div>
    </div>
  </div>
</body>
</html>
