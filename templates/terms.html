<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>利用規約</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/mobile_auth.css') }}" rel="stylesheet">
<style>
body { background:#111; color:#eee; }
.pre-wrap { white-space:pre-wrap; font-size:.85rem; line-height:1.4; background:#1e1e1e; padding:1rem; border-radius:8px; max-height:55vh; overflow:auto; }
.btn-wrap { display:flex; gap:.75rem; }
</style>
</head>
<body class="p-3">
  <div class="container" style="max-width:540px;">
    <h4 class="mb-3">利用規約への同意</h4>
    <div class="pre-wrap mb-3" id="terms-box">{{ terms_text }}</div>
    <form method="POST" class="btn-wrap">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <button name="decision" value="yes" class="btn btn-success flex-fill">Yes (同意する)</button>
      <button name="decision" value="no" class="btn btn-outline-danger flex-fill">No (同意しない)</button>
    </form>
    {% if error %}<div class="text-danger mt-2 small">{{ error }}</div>{% endif %}
  </div>
</body>
</html>
